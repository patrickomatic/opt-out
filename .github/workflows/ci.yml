name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings -D clippy::pedantic

      - name: Install Trunk
        uses: taiki-e/install-action@trunk

      - name: Build static app
        run: trunk build

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run browser e2e tests
        timeout-minutes: 3
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: cargo test --test e2e_menu

      - name: Verify static SEO files
        run: |
          test -f dist/robots.txt
          test -f dist/sitemap.xml
          test -f dist/site.webmanifest
          test -f dist/og-image.png
          grep -q '<urlset' dist/sitemap.xml
          ! grep -qi '<html' dist/sitemap.xml
